<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المخابرات المركزية | CIA SYSTEM</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --panel-bg: #161a22;
            --accent-gold: #d4af37;
            --accent-red: #e74c3c;
            --accent-green: #2ecc71;
            --text-color: #e0e6ed;
            --border-color: #2c3240;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-gold);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header h1 {
            color: var(--accent-gold);
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            color: #8b949e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--accent-gold);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: #0d1117 !important;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff !important;
            font-size: 14px;
            outline: none;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #fff !important;
            -webkit-box-shadow: 0 0 0px 1000px #0d1117 inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        input:focus, select:focus {
            border-color: var(--accent-gold);
        }

        button {
            padding: 12px 15px;
            background: var(--accent-gold);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #b59228;
        }

        .btn-full {
            width: 100%;
        }

        .btn-danger {
            background: var(--accent-red);
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-sm {
            padding: 6px 10px;
            font-size: 12px;
            width: auto;
        }

        .hidden {
            display: none !important;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        th {
            background-color: #0d1117;
            color: var(--accent-gold);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: #21262d;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }

        .admin-box {
            background: #0d1117;
            border: 1px dashed var(--accent-gold);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .action-flex {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-flex select {
            width: 180px;
            padding: 6px;
        }

        .error-msg {
            color: var(--accent-red);
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌐 نظام الاستخبارات العامة | CIA DATABASE</h1>
        <p>نظام إلكتروني سري لمتابعة وإدارة الرتب والعملاء</p>
    </div>

    <!-- 1. صفحة التسجيل والدخول -->
    <div id="login-section">
        <h2 style="margin-bottom: 15px; font-size: 18px;">تسجيل الدخول / إنشاء حساب عميل</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">الاسم الكامل / الرمز:</label>
                <input type="text" id="username" placeholder="أدخل اسمك..." required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">كلمة السر الخاصة بك:</label>
                <input type="password" id="password" placeholder="أدخل كلمة السر..." required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="initial-rank">الرتبة الأولية عند التسجيل الجديد:</label>
                <select id="initial-rank" disabled>
                    <option value="مستجد" selected>مستجد</option>
                </select>
            </div>
            <button type="submit" class="btn-full">دخول / إنشاء حساب</button>
            <p id="login-error" class="error-msg"></p>
        </form>
    </div>

    <!-- 2. لوحة النظام الرئيسية -->
    <div id="dashboard-section" class="hidden">
        <div class="top-bar">
            <div>أهلاً بك العميل: <span id="current-user-display" style="color: var(--accent-gold); font-weight: bold;"></span> (<span id="current-rank-display" style="color: #fff;"></span>)</div>
            <button class="btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
        </div>

        <!-- منطقة تفعيل وضع الأدمن -->
        <div class="admin-box" id="admin-box-container">
            <h3 style="font-size: 14px; margin-bottom: 10px; color: var(--accent-gold);">🔓 صلاحيات التعديل (إدخال الكود)</h3>
            <div style="display: flex; gap: 10px;">
                <input type="password" id="admin-code-input" placeholder="أدخل كود التفعيل لتعديل الرتب...">
                <button style="width: 150px;" onclick="unlockAdmin()">تفعيل</button>
            </div>
            <p id="admin-msg" style="font-size: 12px; margin-top: 5px;"></p>
        </div>

        <!-- قائمة العملاء والترقيات -->
        <h3>📋 سجل العملاء والرتب الحالية</h3>
        <table>
            <thead>
                <tr>
                    <th>الاسم / الكود</th>
                    <th>الرتبة الحالية</th>
                    <th id="admin-actions-header" class="hidden">تعديل الرتبة / الإجراءات</th>
                </tr>
            </thead>
            <tbody id="agents-table-body">
                <!-- كايتزاد هنا بـ JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const RANKS = [
        "مستجد",
        "جندي",
        "جندي اول",
        "عريف",
        "وكيل رقيب",
        "رقيب",
        "رقيب اول",
        "رئيس رقباء",
        "ملازم",
        "ملازم اول",
        "نقيب",
        "رائد",
        "مقدم",
        "عقيد",
        "عميد",
        "فريق",
        "فريق اول",
        "مستشار رئيس الاستخبارات",
        "نائب رئيس الاستخبارات",
        "قائد الاستخبارات"
    ];

    const OWNER_CODE = "mehdicia"; // كود المالك للتحكم المطلق
    const ADMIN_SECRET = "ciaontop"; // كود الترقية للمسؤولين
    
    let isOwnerUnlocked = false; // تفعيل وضع المالك
    let isCodeUnlocked = false;  // تفعيل وضع المشرف
    let currentUser = null;

    function getAgents() {
        const data = localStorage.getItem('cia_agents_online');
        return data ? JSON.parse(data) : [];
    }

    function saveAgents(agents) {
        localStorage.setItem('cia_agents_online', JSON.stringify(agents));
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('login-error');
        errorMsg.innerText = '';

        if (!name || !pass) return;

        let agents = getAgents();
        let existingUser = agents.find(a => a.name.toLowerCase() === name.toLowerCase());

        if (existingUser) {
            if (existingUser.password === pass) {
                currentUser = existingUser;
                showDashboard();
            } else {
                errorMsg.innerText = "✕ كلمة السر غير صحيحة لهذا الاسم!";
            }
        } else {
            const newUser = { name: name, password: pass, rank: "مستجد" };
            agents.push(newUser);
            saveAgents(agents);
            currentUser = newUser;
            showDashboard();
        }
    });

    function showDashboard() {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        document.getElementById('current-user-display').innerText = currentUser.name;
        document.getElementById('current-rank-display').innerText = currentUser.rank;
        
        const isLeader = (currentUser.rank === "قائد الاستخبارات" || currentUser.rank === "نائب رئيس الاستخبارات");

        if (isLeader) {
            isCodeUnlocked = true;
            document.getElementById('admin-box-container').style.display = "none";
            document.getElementById('admin-actions-header').classList.remove('hidden');
        } else {
            document.getElementById('admin-box-container').style.display = "block";
            document.getElementById('admin-actions-header').classList.add('hidden');
        }

        renderTable();
    }

    function unlockAdmin() {
        const inputCode = document.getElementById('admin-code-input').value.trim();
        const msg = document.getElementById('admin-msg');
        
        const myRankIndex = RANKS.indexOf(currentUser.rank);
        const mulazimIndex = RANKS.indexOf("ملازم");

        // 1. تفعيل كود المالك (mehdicia) -> تحكم كامل ومطلق
        if (inputCode === OWNER_CODE) {
            isOwnerUnlocked = true;
            msg.style.color = "var(--accent-green)";
            msg.innerText = "👑 أهلاً بك القائد mehdicia! تم تفعيل الصلاحيات المطلقة.";
            document.getElementById('admin-actions-header').classList.remove('hidden');
            renderTable();
            return;
        }

        // 2. تفعيل كود المشرفين (ciaontop) -> بشرط أن تكون رتبته ملازم أو أعلى
        if (inputCode === ADMIN_SECRET) {
            if (myRankIndex < mulazimIndex) {
                msg.style.color = "var(--accent-red)";
                msg.innerText = "✕ رتبتك الحالية لا تسمح لك بالترقية! (يجب أن تكون برتبة ملازم أو أعلى).";
                return;
            }

            isCodeUnlocked = true;
            msg.style.color = "var(--accent-green)";
            msg.innerText = "✓ تم تفعيل الصلاحيات! يمكنك الآن تعديل رتب من هم أقل منك فقط.";
            document.getElementById('admin-actions-header').classList.remove('hidden');
            renderTable();
        } else {
            msg.style.color = "var(--accent-red)";
            msg.innerText = "✕ كود السر غير صحيح!";
        }
    }

    function renderTable() {
        const agents = getAgents();
        const tbody = document.getElementById('agents-table-body');
        if (!tbody || !currentUser) return;
        tbody.innerHTML = '';

        const myRankIndex = RANKS.indexOf(currentUser.rank);

        agents.forEach((agent, index) => {
            const tr = document.createElement('tr');
            const targetRankIndex = RANKS.indexOf(agent.rank);

            let actionsHTML = '';

            // 1. إذا أدخل كود mehdicia (تحكم مطلق بكافة الرتب)
            if (isOwnerUnlocked) {
                let optionsHTML = RANKS.map(r => `<option value="${r}" ${r === agent.rank ? 'selected' : ''}>${r}</option>`).join('');

                actionsHTML = `
                    <td>
                        <div class="action-flex">
                            <select id="rank-select-${index}">
                                ${optionsHTML}
                            </select>
                            <button class="btn-sm" onclick="setDirectRank(${index})">تطبيق</button>
                            <button class="btn-sm btn-danger" style="background:#555;" onclick="deleteAgent(${index})">🗑️ طرد</button>
                        </div>
                    </td>
                `;
            } 
            // 2. إذا تم تفعيل كود ciaontop (أو كان قائد/نائب) تعديل من هم أقل فقط
            else if (isCodeUnlocked && myRankIndex > targetRankIndex) {
                let allowedRanks = RANKS.slice(0, myRankIndex);
                let optionsHTML = allowedRanks.map(r => `<option value="${r}" ${r === agent.rank ? 'selected' : ''}>${r}</option>`).join('');

                actionsHTML = `
                    <td>
                        <div class="action-flex">
                            <select id="rank-select-${index}">
                                ${optionsHTML}
                            </select>
                            <button class="btn-sm" onclick="setDirectRank(${index})">تطبيق</button>
                            <button class="btn-sm btn-danger" style="background:#555;" onclick="deleteAgent(${index})">🗑️ طرد</button>
                        </div>
                    </td>
                `;
            } else if (isCodeUnlocked) {
                actionsHTML = `<td><span style="font-size:11px; color:#777;">(رتبة أعلى منك/مساوية)</span></td>`;
            } else {
                actionsHTML = `<td class="hidden"></td>`;
            }

            tr.innerHTML = `
                <td><strong>${agent.name}</strong></td>
                <td><span class="badge">${agent.rank}</span></td>
                ${actionsHTML}
            `;
            tbody.appendChild(tr);
        });
    }

    function setDirectRank(index) {
        const select = document.getElementById(`rank-select-${index}`);
        const selectedRank = select.value;
        let agents = getAgents();
        agents[index].rank = selectedRank;
        saveAgents(agents);
        renderTable();
    }

    function deleteAgent(index) {
        if (confirm("هل أنت تأكد من طرد هذا العميل من القاعدة؟")) {
            let agents = getAgents();
            agents.splice(index, 1);
            saveAgents(agents);
            renderTable();
        }
    }

    function logout() {
        isOwnerUnlocked = false;
        isCodeUnlocked = false;
        currentUser = null;
        document.getElementById('password').value = '';
        document.getElementById('login-error').innerText = '';
        document.getElementById('admin-code-input').value = '';
        document.getElementById('admin-msg').innerText = '';
        document.getElementById('admin-box-container').style.display = "block";
        document.getElementById('admin-actions-header').classList.add('hidden');
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
    }
</script>

</body>
</html>
